{% extends 'base.html' %}{% load crispy_forms_tags %}{% block content %}<div class="container-narrow py-3"><div class="mb-4"><span class="badge text-bg-success mb-2">Reply</span><h1 class="h3 mb-1">Reply to {{ original.sender.get_full_name|default:original.sender }}</h1><p class="text-muted mb-0">Regarding: {{ original.subject }}</p></div><div class="card"><div class="card-body p-3 p-md-4"><form method="post">{% csrf_token %}{{ form|crispy }}<div class="d-flex justify-content-end gap-2"><a href="{% url 'message_detail' original.id %}" class="btn btn-light">Cancel</a><button class="btn btn-success"><i class="bi bi-send-fill me-1"></i>Send reply</button></div></form></div></div></div>{% endblock %}
