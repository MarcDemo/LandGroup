{% extends 'base.html' %}
{% load form_tags %}

{% block content %}
<div class="container py-4">
  <h3 class="mb-4 text-danger"><i class="bi bi-cash-stack me-2"></i> Add Expenditure</h3>

  <form method="post" class="card shadow-sm p-4 bg-light border-0">
    {% csrf_token %}
    <div class="row g-3">
      <div class="col-md-6">
        <label class="form-label">Source</label>
        {{ form.source|add_class:"form-select" }}
      </div>
      <div class="col-md-6">
        <label class="form-label">Amount</label>
        {{ form.amount|add_class:"form-control" }}
      </div>
      <div class="col-12">
        <label class="form-label">Purpose / Description</label>
        {{ form.description|add_class:"form-control" }}
      </div>
    </div>
    <div class="mt-4 text-end">
      <button type="submit" class="btn btn-danger">
        <i class="bi bi-save me-1"></i> Save Expenditure
      </button>
    </div>
  </form>
</div>
{% endblock %}
