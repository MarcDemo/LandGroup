{% extends 'groupcore/auth_base.html' %}
{% block title %}Sign in · LandGroup{% endblock %}
{% block header %}Welcome back{% endblock %}
{% block subheader %}Sign in to manage your savings and group activity securely.{% endblock %}
{% block form %}<form method="post" novalidate>{% csrf_token %}<div class="mb-3 text-start"><label for="id_username" class="form-label">Username</label><div class="input-group"><span class="input-group-text bg-white border-end-0 rounded-start-3"><i class="bi bi-person text-success"></i></span><input type="text" class="form-control border-start-0" id="id_username" name="username" autocomplete="username" placeholder="Enter your username" required></div></div><div class="mb-3 text-start"><label for="id_password" class="form-label">Password</label><div class="input-group"><span class="input-group-text bg-white border-end-0 rounded-start-3"><i class="bi bi-lock text-success"></i></span><input type="password" class="form-control border-start-0" id="id_password" name="password" autocomplete="current-password" placeholder="Enter your password" required></div></div><div class="text-end mb-4"><a href="{% url 'forgot_password' %}" class="small text-success text-decoration-none fw-semibold">Forgot password?</a></div><button type="submit" class="btn btn-success"><i class="bi bi-box-arrow-in-right me-2"></i>Sign in</button></form>{% endblock %}
