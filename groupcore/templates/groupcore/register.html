{% extends 'base.html' %}{% load crispy_forms_tags %}
{% block content %}
<div class="container-narrow py-3">
  <div class="mb-4"><span class="badge text-bg-success mb-2">Chairman tools</span><h1 class="h3 mb-1">Register a member</h1><p class="text-muted mb-0">Create a secure LandGroup account and assign the correct role.</p></div>
  <div class="card"><div class="card-body p-3 p-md-4"><form method="post" novalidate>{% csrf_token %}{{ form|crispy }}<div class="d-flex justify-content-end gap-2 mt-4"><a href="{% url 'manage_users' %}" class="btn btn-light">Cancel</a><button type="submit" class="btn btn-success"><i class="bi bi-person-plus me-1"></i>Create member</button></div></form></div></div>
</div>
{% endblock %}
