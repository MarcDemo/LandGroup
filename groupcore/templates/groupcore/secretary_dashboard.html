{% extends 'base.html' %}
{% load static %}

{% block content %}
<div class="container py-4">
  <h2 class="text-primary mb-4"><i class="bi bi-person-badge-fill me-2"></i>Secretary Dashboard</h2>

  <div class="row g-4 mb-4">
    <div class="col-md-3">
      <div class="card text-white bg-primary shadow-sm">
        <div class="card-body">
          <h5 class="card-title"><i class="bi bi-folder2-open me-2"></i>Total Documents</h5>
          <p class="card-text fs-4">{{ total_documents }}</p>
        </div>
      </div>
    </div>
    <div class="col-md-3">
      <div class="card text-white bg-success shadow-sm">
        <div class="card-body">
          <h5 class="card-title"><i class="bi bi-person-vcard me-2"></i>My Documents</h5>
          <p class="card-text fs-4">{{ personal_documents }}</p>
        </div>
      </div>
    </div>
    <div class="col-md-3">
      <div class="card text-white bg-info shadow-sm">
        <div class="card-body">
          <h5 class="card-title"><i class="bi bi-people-fill me-2"></i>Total Members</h5>
          <p class="card-text fs-4">{{ total_members }}</p>
        </div>
      </div>
    </div>
  </div>

  <div class="row g-3">
    <div class="col-md-6">
      <a href="{% url 'upload_document' %}" class="btn btn-outline-primary w-100">
        <i class="bi bi-upload me-2"></i> Upload New Document
      </a>
    </div>
    <div class="col-md-6">
      <a href="{% url 'list_documents' %}" class="btn btn-outline-secondary w-100">
        <i class="bi bi-journal-text me-2"></i> View Documents
      </a>
    </div>
    <div class="col-md-6 mt-3">
      <a href="{% url 'member_dashboard' %}" class="btn btn-outline-dark w-100">
        <i class="bi bi-person-lines-fill me-2"></i> My Member Dashboard
      </a>
    </div>
  </div>
</div>
{% endblock %}
